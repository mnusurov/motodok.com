name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/cache@v4
        with:
          path: .cache/indexnow-manifest.json
          key: indexnow-manifest-${{ github.run_id }}
          restore-keys: indexnow-manifest-
      - uses: cloudflare/wrangler-action@v4
        with:
          wranglerVersion: "latest"
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=motodok-com --branch=main --commit-dirty=true
      - run: node scripts/indexnow-ping.mjs
