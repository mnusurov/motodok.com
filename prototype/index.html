<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motodok — Prototype вариантов дизайна 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ========== Variant A: Dark Industrial ========== */
.variant-a {
  --bg: #0d0d0d;
  --bg2: #1a1a1a;
  --surface: #1f1f1f;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text2: #888;
  --accent: #ff6b35;
  --accent2: #ff8c5a;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
.variant-a header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.variant-a .logo {
  font-weight: 800;
  font-size: 1.3rem;
  letter-spacing: -0.02em;
  color: var(--accent);
  text-transform: uppercase;
}
.variant-a nav a {
  color: var(--text2);
  text-decoration: none;
  font-size: .85rem;
  padding: .5rem .75rem;
  transition: color .2s;
}
.variant-a nav a:hover { color: var(--text) }
.variant-a .hero {
  padding: 5rem 2rem 4rem;
  text-align: center;
  max-width: 800px;
  margin: 0 auto;
}
.variant-a .hero h1 {
  font-size: 3rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 1rem;
}
.variant-a .hero h1 span { color: var(--accent) }
.variant-a .hero p {
  color: var(--text2);
  font-size: 1.1rem;
  max-width: 600px;
  margin: 0 auto 2rem;
}
.variant-a .hero-search {
  display: flex;
  max-width: 480px;
  margin: 0 auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface);
}
.variant-a .hero-search input {
  flex: 1;
  padding: .85rem 1rem;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: .9rem;
  outline: none;
}
.variant-a .hero-search button {
  background: var(--accent);
  border: none;
  color: #000;
  font-weight: 600;
  padding: 0 1.5rem;
  cursor: pointer;
  font-size: .85rem;
}
.variant-a .section {
  padding: 3rem 2rem;
  max-width: 1200px;
  margin: 0 auto;
}
.variant-a .section h2 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}
.variant-a .category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: .75rem;
}
.variant-a .category-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem 1rem;
  text-align: center;
  text-decoration: none;
  color: var(--text);
  transition: border-color .2s, transform .2s;
  cursor: pointer;
}
.variant-a .category-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.variant-a .category-card .icon { font-size: 2rem; margin-bottom: .5rem; }
.variant-a .category-card .name { font-weight: 600; font-size: .9rem; }
.variant-a .category-card .count { color: var(--text2); font-size: .75rem; margin-top: .25rem; }
.variant-a .product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}
.variant-a .product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  transition: border-color .2s;
}
.variant-a .product-card:hover { border-color: var(--accent) }
.variant-a .product-card h3 { font-size: 1rem; margin-bottom: .5rem; }
.variant-a .product-card p { color: var(--text2); font-size: .8rem; margin-bottom: .75rem; line-height: 1.4; }
.variant-a .product-card .price { 
  color: var(--accent); 
  font-weight: 700; 
  font-size: 1.1rem;
  font-variant-numeric: tabular-nums;
}
.variant-a footer {
  border-top: 1px solid var(--border);
  padding: 2rem;
  text-align: center;
  color: var(--text2);
  font-size: .8rem;
}

/* ========== Variant B: Clean B2B Professional ========== */
.variant-b {

.variant-b .btn-primary {

}
.variant-b .btn-secondary {
  background: transparent;

  font-size: .9rem;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}
.variant-b .hero-features {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.variant-b .hero-feature {
  background: var(--bg);
  padding: 1rem;

}
.variant-b .hero-feature h3 { font-size: .9rem; margin-bottom: .25rem; }
.variant-b .hero-feature p { font-size: .8rem; color: var(--text2); margin: 0; }
.variant-b .section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 3rem 2rem;
}
.variant-b .section h2 {
  font-size: 1.35rem;
  font-weight: 600;
  margin-bottom: .5rem;
}
.variant-b .section .subtitle { color: var(--text2); font-size: .9rem; margin-bottom: 1.5rem; }
.variant-b .product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1rem;
}
.variant-b .product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  transition: box-shadow .2s;
}
.variant-b .product-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.06) }
.variant-b .product-card .tag {
  display: inline-block;
  background: #ebf4ff;
  color: var(--accent);
  font-size: .7rem;
  font-weight: 600;
  padding: .2rem .6rem;
  border-radius: 4px;
  margin-bottom: .5rem;
  text-transform: uppercase;

}
.variant-b .product-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: .4rem; }
.variant-b .product-card p { color: var(--text2); font-size: .82rem; line-height: 1.45; margin-bottom: .75rem; }
.variant-b .product-card .meta {
  display: flex;
  justify-content: space-between;

}
.variant-b .product-card .price {
  font-weight: 700;

}
.variant-b .product-card .badge {
  color: var(--green);
  font-size: .8rem;

}
.variant-b .trust-bar {
  border-top: 1px solid var(--border);

}
.variant-b .trust-inner {
  max-width: 1200px;

.variant-b .trust-item { text-align: center; }

.variant-c .hero-inner {

.variant-c .categories {

.variant-c .category-pill {

.variant-c .category-pill:hover {

.variant-c .section {

}
.variant-c .section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;

}
.variant-c .section-header h2 { font-size: 1.4rem; font-weight: 700; }
.variant-c .section-header a {

.variant-c .product-grid {

.variant-c .product-card {

.variant-c .product-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: .35rem; }

/* ========== Switcher Bar ========== */
#variant-switcher {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: #1f2937;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: .5rem 1rem;
  border-radius: 100px;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
  z-index: 9999;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: .85rem;
  user-select: none;
}
#variant-switcher button {
  background: none;
  border: none;
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  padding: .25rem .5rem;
  border-radius: 6px;
  transition: background .15s;
  line-height: 1;
}
#variant-switcher button:hover { background: rgba(255,255,255,.1) }
#variant-switcher .label {
  font-weight: 500;
  min-width: 140px;
  text-align: center;
}
#variant-switcher .dots { display: flex; gap: .35rem; }
#variant-switcher .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  transition: background .2s;
}
#variant-switcher .dot.active { background: #818cf8 }

</head>
<body>

<div id="app"></div>
<div id="variant-switcher">
  <button id="prev-btn" aria-label="Previous variant">←</button>
  <div class="dots" id="dots"></div>
  <span class="label" id="variant-label">A — Dark Industrial</span>
  <button id="next-btn" aria-label="Next variant">→</button>
</div>

<script>
const VARIANTS = [
  { key: 'A', name: 'Dark Industrial', desc: 'Tech-ориентированный, тёмная тема, акцент оранжевый' },
  { key: 'B', name: 'Clean B2B', desc: 'Профессиональный, светлый, для автосервисов' },
  { key: 'C', name: 'Bold Marketplace', desc: 'Современный маркетплейс, градиенты, D2C' },
];

const APP = document.getElementById('app');
const label = document.getElementById('variant-label');
const dots = document.getElementById('dots');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

let currentIdx = 0;

function getVariantFromURL() {
  const params = new URLSearchParams(window.location.search);
  const v = params.get('variant');
  const idx = VARIANTS.findIndex(x => x.key === v);
  return idx >= 0 ? idx : 0;
}

function renderVariant(idx) {
  currentIdx = idx;
  const v = VARIANTS[idx];
  const url = new URL(window.location);
  url.searchParams.set('variant', v.key);
  window.history.replaceState({}, '', url);
  
  label.textContent = `${v.key} — ${v.name}`;
  dots.innerHTML = VARIANTS.map((x, i) => 
    `<span class="dot${i === idx ? ' active' : ''}"></span>`
  ).join('');

  switch(v.key) {
    case 'A': APP.innerHTML = renderVariantA(); break;
    case 'B': APP.innerHTML = renderVariantB(); break;
    case 'C': APP.innerHTML = renderVariantC(); break;
  }
}

function renderVariantA() {
  return `<div class="variant-a">
<header>
  <div class="logo">Motodok</div>
  <nav>
    <a href="#">Каталог</a>
    <a href="#">Новости</a>
    <a href="#">Статьи</a>
    <a href="#">Цены</a>
    <a href="#">Контакты</a>
  </nav>
</header>
<section class="hero">
  <h1>Оборудование для <span>автодиагностики</span></h1>
  <p>От любителя до профессионала — весь спектр оборудования для компьютерной диагностики автомобилей</p>
  <div class="hero-search">
    <input type="text" placeholder="Поиск оборудования, бренда, модели...">
    <button>Найти</button>
  </div>
</section>
<section class="section">
  <h2>Категории</h2>
  <div class="category-grid">
    <div class="category-card"><div class="icon">🔧</div><div class="name">Диагностика</div><div class="count">24 товара</div></div>

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea, [contenteditable]')) return;
  if (e.key === 'ArrowLeft') { currentIdx = (currentIdx - 1 + VARIANTS.length) % VARIANTS.length; renderVariant(currentIdx); }
  if (e.key === 'ArrowRight') { currentIdx = (currentIdx + 1) % VARIANTS.length; renderVariant(currentIdx); }
});

prevBtn.addEventListener('click', () => {
  currentIdx = (currentIdx - 1 + VARIANTS.length) % VARIANTS.length;
  renderVariant(currentIdx);
});
nextBtn.addEventListener('click', () => {
  currentIdx = (currentIdx + 1) % VARIANTS.length;
  renderVariant(currentIdx);
});

// Init
renderVariant(getVariantFromURL());
</script>
