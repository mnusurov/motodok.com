backend:
  name: github
  repo: mnusurov/motodok.com
  branch: main
  base_url: https://motodok.com
  auth_endpoint: /api/auth

publish_mode: editorial_workflow

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Товары"
    label_singular: "Товар"
    folder: "src/content/products"
    create: true
    format: "yaml-frontmatter"
    extension: "mdx"
    media_folder: "/public/images/products"
    public_folder: "/images/products"
    slug: "{{slug}}"
    summary: "{{title}} — {{price}}$"
    sortable_fields:
      fields: [title, price, order, publishedDate]
      default:
        field: order
        direction: ascending
    fields:
      - { label: "Название", name: "title", widget: "string" }
      - { label: "URL (slug)", name: "slug", widget: "string", hint: "Автоматически из названия" }
      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - { label: "Диагностика", value: "diagnosis" }
          - { label: "Измерение", value: "measure" }
          - { label: "Иммобилайзеры", value: "immobilizer" }
          - { label: "Одометры", value: "odometers" }
          - { label: "Базы данных", value: "databases" }
      - { label: "Бренд", name: "brand", widget: "relation", collection: "brands", search_fields: ["title"], value_field: "slug", display_fields: ["title"], required: false }
      - { label: "Артикул", name: "article", widget: "string", required: false }
      - { label: "Цена ($)", name: "price", widget: "number", value_type: "float", min: 0, required: false }
      - { label: "Старая цена ($)", name: "oldPrice", widget: "number", value_type: "float", min: 0, required: false }
      - { label: "Валюта", name: "currency", widget: "string", default: "USD", required: false }
      - { label: "В наличии", name: "inStock", widget: "boolean", default: true }
      - { label: "Изображения", name: "images", widget: "list", field: { label: "Изображение", name: "image", widget: "image" }, required: false }
      - { label: "PDF-файлы", name: "pdfFiles", widget: "list", field: { label: "Файл", name: "file", widget: "file" }, required: false }
      - { label: "Содержание", name: "body", widget: "markdown" }
      - { label: "Характеристики", name: "features", widget: "list", field: { label: "Характеристика", name: "feature", widget: "text" }, required: false }
      - { label: "Спецификации", name: "specifications", widget: "map", required: false }
      - { label: "Дата публикации", name: "publishedDate", widget: "datetime", required: false }
      - { label: "Дата обновления", name: "updatedDate", widget: "datetime", required: false }
      - { label: "Meta Title", name: "metaTitle", widget: "string", required: false, hint: "Оставьте пустым для автогенерации" }
      - { label: "Meta Description", name: "metaDescription", widget: "text", required: false }
      - { label: "OG Image", name: "ogImage", widget: "image", required: false }
      - { label: "Порядок сортировки", name: "order", widget: "number", value_type: "int", required: false }
      - { label: "Рекомендуемый", name: "featured", widget: "boolean", default: false, required: false }

  - name: "categories"
    label: "Категории"
    label_singular: "Категория"
    folder: "src/content/categories"
    create: false
    format: "yml"
    media_folder: "/public/images/categories"
    public_folder: "/images/categories"
    slug: "{{slug}}"
    fields:
      - { label: "Название", name: "title", widget: "string" }
      - { label: "URL (slug)", name: "slug", widget: "string" }
      - { label: "Описание", name: "description", widget: "text" }
      - { label: "Изображение", name: "image", widget: "image", required: false }
      - { label: "Порядок", name: "order", widget: "number", value_type: "int" }
      - { label: "Meta Title", name: "metaTitle", widget: "string", required: false }
      - { label: "Meta Description", name: "metaDescription", widget: "text", required: false }

  - name: "brands"
    label: "Бренды"
    label_singular: "Бренд"
    folder: "src/content/brands"
    create: true
    format: "yml"
    media_folder: "/public/images/brands"
    public_folder: "/images/brands"
    slug: "{{slug}}"
    fields:
      - { label: "Название", name: "title", widget: "string" }
      - { label: "URL (slug)", name: "slug", widget: "string" }
      - { label: "Логотип", name: "logo", widget: "image" }
      - { label: "Описание", name: "description", widget: "text", required: false }
      - { label: "Страна", name: "country", widget: "string", required: false }
      - { label: "Веб-сайт", name: "website", widget: "string", required: false }

  - name: "articles"
    label: "Статьи"
    label_singular: "Статья"
    folder: "src/content/articles"
    create: true
    format: "yaml-frontmatter"
    extension: "mdx"
    media_folder: "/public/images/articles"
    public_folder: "/images/articles"
    slug: "{{slug}}"
    summary: "{{title}} — {{publishedDate}}"
    sortable_fields:
      fields: [title, author, publishedDate, updatedDate]
      default:
        field: publishedDate
        direction: descending
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "URL (slug)", name: "slug", widget: "string" }
      - { label: "Описание", name: "description", widget: "text" }
      - { label: "Изображение", name: "image", widget: "image", required: false }
      - { label: "Автор", name: "author", widget: "string", default: "Motodok" }
      - { label: "Дата публикации", name: "publishedDate", widget: "datetime" }
      - { label: "Дата обновления", name: "updatedDate", widget: "datetime", required: false }
      - { label: "Теги", name: "tags", widget: "list", field: { label: "Тег", name: "tag", widget: "string" }, required: false }
      - { label: "Содержание", name: "body", widget: "markdown" }
      - { label: "Meta Title", name: "metaTitle", widget: "string", required: false }
      - { label: "Meta Description", name: "metaDescription", widget: "text", required: false }

  - name: "news"
    label: "Новости"
    label_singular: "Новость"
    folder: "src/content/news"
    create: true
    format: "yaml-frontmatter"
    extension: "mdx"
    media_folder: "/public/images/news"
    public_folder: "/images/news"
    slug: "{{slug}}"
    summary: "{{title}} — {{publishedDate}}"
    sortable_fields:
      fields: [title, publishedDate, updatedDate]
      default:
        field: publishedDate
        direction: descending
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "URL (slug)", name: "slug", widget: "string" }
      - { label: "Описание", name: "description", widget: "text" }
      - { label: "Изображение", name: "image", widget: "image", required: false }
      - { label: "Дата публикации", name: "publishedDate", widget: "datetime" }
      - { label: "Дата обновления", name: "updatedDate", widget: "datetime", required: false }
      - { label: "Содержание", name: "body", widget: "markdown" }
      - { label: "Meta Title", name: "metaTitle", widget: "string", required: false }
      - { label: "Meta Description", name: "metaDescription", widget: "text", required: false }

  - name: "services"
    label: "Услуги"
    label_singular: "Услуга"
    folder: "src/content/services"
    create: true
    format: "yaml-frontmatter"
    extension: "mdx"
    media_folder: "/public/images/services"
    public_folder: "/images/services"
    slug: "{{slug}}"
    fields:
      - { label: "Название", name: "title", widget: "string" }
      - { label: "URL (slug)", name: "slug", widget: "string" }
      - { label: "Описание", name: "description", widget: "text" }
      - { label: "Изображение", name: "image", widget: "image", required: false }
      - { label: "Цена", name: "price", widget: "string", required: false }
      - { label: "Содержание", name: "body", widget: "markdown" }
      - { label: "Meta Title", name: "metaTitle", widget: "string", required: false }
      - { label: "Meta Description", name: "metaDescription", widget: "text", required: false }

  - name: "pages"
    label: "Страницы"
    label_singular: "Страница"
    folder: "src/content/pages"
    create: false
    format: "yaml-frontmatter"
    extension: "mdx"
    media_folder: "/public/images/pages"
    public_folder: "/images/pages"
    slug: "{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "URL (slug)", name: "slug", widget: "string" }
      - { label: "Описание", name: "description", widget: "text", required: false }
      - { label: "Содержание", name: "body", widget: "markdown" }
      - { label: "Порядок", name: "order", widget: "number", value_type: "int", default: 10 }
      - { label: "Meta Title", name: "metaTitle", widget: "string", required: false }
      - { label: "Meta Description", name: "metaDescription", widget: "text", required: false }
